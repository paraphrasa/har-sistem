<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HAR — Input Nota</title>
<style>
  :root {
    --bg: #f0ede8;
    --surface: #ffffff;
    --border: #d8d3ca;
    --text: #1a1a18;
    --text-dim: #888278;
    --accent: #2c5f2e;
    --accent-light: #e8f0e8;
    --red: #b91c1c;
    --red-light: #fef2f2;
    --orange: #c2410c;
    --orange-light: #fff7ed;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 15px;
    padding-bottom: 90px;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--accent);
    color: #fff;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .h-title { font-size: 16px; font-weight: 700; }
  .h-date  { font-size: 12px; opacity: 0.75; }

  .wrap { padding: 12px; max-width: 600px; margin: 0 auto; }

  .tipe-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .tipe-btn {
    padding: 14px 4px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    letter-spacing: 0.04em;
    -webkit-appearance: none;
  }
  .tb-beli    { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .tb-jual    { border-color: var(--red);    background: var(--red-light);    color: var(--red); }
  .tb-packing { border-color: var(--orange); background: var(--orange-light); color: var(--orange); }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .inp {
    width: 100%;
    height: 50px;
    padding: 0 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
  }
  .inp:focus { outline: none; border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .item-card {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    background: #fafaf8;
  }
  .item-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }
  .btn-del {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--text-dim);
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
  }
  .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .item-lbl {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
    display: block;
  }
  .item-inp {
    width: 100%;
    height: 48px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    text-align: center;
    background: var(--surface);
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    padding: 0 6px;
  }
  .item-inp:focus { outline: none; border-color: var(--accent); }
  .item-inp:disabled { background: var(--bg); color: var(--text-dim); }
  .item-sel {
    width: 100%;
    height: 48px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    padding: 0 10px;
    text-align: center;
  }
  .item-sel:focus { outline: none; border-color: var(--accent); }
  .item-jml {
    margin-top: 10px;
    text-align: right;
    font-size: 11px;
    color: var(--text-dim);
  }
  .item-jml b {
    font-size: 17px;
    font-family: 'Courier New', monospace;
    color: var(--accent);
    margin-left: 6px;
  }

  .btn-add {
    width: 100%;
    height: 46px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    background: none;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-add:active { border-color: var(--accent); color: var(--accent); }

  .es-row { display: flex; align-items: center; gap: 12px; }
  .es-inp {
    width: 80px;
    height: 50px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 22px;
    font-family: 'Courier New', monospace;
    text-align: center;
    background: var(--surface);
    color: var(--text);
    -webkit-appearance: none;
    flex-shrink: 0;
  }
  .es-inp:focus { outline: none; border-color: var(--accent); }
  .es-lbl  { flex: 1; font-size: 13px; color: var(--text-dim); }
  .es-tot  { font-family: 'Courier New', monospace; font-size: 16px; font-weight: 700; color: var(--red); }

  .tot-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--bg);
  }
  .tot-row:last-child { border-bottom: none; }
  .tot-lbl { font-size: 13px; color: var(--text-dim); }
  .tot-val { font-family: 'Courier New', monospace; font-size: 15px; font-weight: 700; }
  .tot-grand { font-size: 22px; color: var(--accent); }

  .action-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 50;
  }
  .btn-main {
    width: 100%;
    height: 54px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-main:active { background: #1e4220; }
  .btn-main:disabled { background: var(--border); color: var(--text-dim); }

  .toast {
    position: fixed;
    bottom: 76px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #1a1a18;
    color: #fff;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.2s;
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok  { background: var(--accent); }
  .toast.err { background: var(--red); }

  @media print {
    body, header, .action-bar, .toast { display: none !important; }
    .nota-print { display: block !important; }
  }
  .nota-print {
    display: none;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 6px;
    max-width: 280px;
  }
  .np-c  { text-align: center; }
  .np-b  { font-weight: bold; }
  .np-s  { font-size: 10px; }
  .np-lg { font-size: 14px; font-weight: bold; }
  .np-d  { border-top: 1px dashed #000; margin: 5px 0; }
  .np-r  { display: flex; justify-content: space-between; margin-bottom: 2px; }
  .np-sig { display: flex; justify-content: space-between; margin-top: 16px; }
  .np-sc  { text-align: center; width: 45%; font-size: 10px; }
  .np-sl  { margin-top: 36px; border-top: 1px solid #000; padding-top: 3px; }
</style>
</head>
<body>

<header>
  <div class="h-title">HAR // Input Nota</div>
  <div class="h-date" id="h-date"></div>
</header>

<div class="wrap">

  <div class="tipe-row" style="margin-top:12px">
    <button class="tipe-btn tb-beli" data-tipe="beli" onclick="setTipe('beli')">BELI</button>
    <button class="tipe-btn" data-tipe="jual" onclick="setTipe('jual')">JUAL</button>
    <button class="tipe-btn" data-tipe="packing" onclick="setTipe('packing')">PACKING</button>
  </div>

  <div class="card">
    <div class="card-title">Info Nota</div>
    <div class="field">
      <label>Supplier</label>
      <input class="inp" type="text" id="supplier"
        placeholder="Ketik nama supplier..." list="sl" autocomplete="off">
      <datalist id="sl">
        <option value="Bakri">
        <option value="Dahlan">
        <option value="Manna">
      </datalist>
    </div>
    <div class="row2">
      <div class="field">
        <label>Tanggal</label>
        <input class="inp" type="date" id="tgl">
      </div>
      <div class="field">
        <label>No. Nota</label>
        <input class="inp" type="text" id="nonota" placeholder="Opsional">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Item Udang</div>
    <div id="items"></div>
    <button class="btn-add" onclick="addItem()">＋ Tambah Baris</button>
  </div>

  <div class="card">
    <div class="card-title">Es Balok (Opsional)</div>
    <div class="es-row">
      <input type="number" class="es-inp" id="es-qty"
        placeholder="0" min="0" inputmode="numeric" oninput="updEs()">
      <div class="es-lbl">balok × <b>Rp 17.000</b></div>
      <div class="es-tot" id="es-tot">Rp 0</div>
    </div>
  </div>

  <div class="card">
    <div class="tot-row">
      <span class="tot-lbl">Total Timbangan</span>
      <span class="tot-val" id="t-kg">0.00 kg</span>
    </div>
    <div class="tot-row">
      <span class="tot-lbl">Subtotal</span>
      <span class="tot-val" id="t-sub">Rp 0</span>
    </div>
    <div class="tot-row" id="t-es-row" style="display:none">
      <span class="tot-lbl">Potongan Es</span>
      <span class="tot-val" style="color:var(--red)" id="t-es">– Rp 0</span>
    </div>
    <div class="tot-row">
      <span class="tot-lbl" style="font-weight:700;color:var(--text)">TOTAL BAYAR</span>
      <span class="tot-val tot-grand" id="t-tot">Rp 0</span>
    </div>
  </div>

</div>

<div class="action-bar">
  <button class="btn-main" id="btn-main" onclick="go()">✓ Simpan & Print</button>
</div>

<div class="toast" id="toast"></div>
<div class="nota-print" id="np"></div>

<script>
const JENIS = [
  {kode:'T',  nama:'Tiger',       uk:true },
  {kode:'W',  nama:'White',       uk:false},
  {kode:'BR', nama:'Brown',       uk:false},
  {kode:'HO', nama:'Tiger H.O.',  uk:true },
  {kode:'WHO',nama:'White H.O.',  uk:false},
  {kode:'PT', nama:'Pink Tambak', uk:true },
];
const ES_H = 17000;
let tipe='beli', n=0, last=null;

window.onload = () => {
  const d = new Date();
  document.getElementById('tgl').value = d.toISOString().split('T')[0];
  document.getElementById('h-date').textContent =
    d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  addItem();
};

function setTipe(t) {
  tipe = t;
  document.querySelectorAll('.tipe-btn').forEach(b => {
    b.className = 'tipe-btn';
    if (b.dataset.tipe === t) b.classList.add('tb-'+t);
  });
}

function addItem() {
  const id = ++n;
  const div = document.createElement('div');
  div.className = 'item-card';
  div.id = 'ic-'+id;
  div.innerHTML = `
    <div class="item-head">
      <span>ITEM ${id}</span>
      <button class="btn-del" onclick="delItem(${id})">×</button>
    </div>
    <div class="item-grid">
      <div>
        <span class="item-lbl">Jenis</span>
        <select class="item-sel" id="j${id}" onchange="onJ(${id})">
          ${JENIS.map(j=>`<option value="${j.kode}">${j.kode} — ${j.nama}</option>`).join('')}
        </select>
      </div>
      <div>
        <span class="item-lbl">Ukuran</span>
        <input type="number" class="item-inp" id="u${id}"
          placeholder="—" inputmode="numeric" oninput="calc(${id})">
      </div>
      <div>
        <span class="item-lbl">Berat (kg)</span>
        <input type="number" class="item-inp" id="b${id}"
          placeholder="0.00" step="0.01" inputmode="decimal" oninput="calc(${id})">
      </div>
      <div>
        <span class="item-lbl">Harga (ribu)</span>
        <input type="number" class="item-inp" id="h${id}"
          placeholder="0" inputmode="numeric" oninput="calc(${id})">
      </div>
    </div>
    <div class="item-jml">Jumlah: <b id="jml${id}">Rp 0</b></div>
  `;
  document.getElementById('items').appendChild(div);
  setTimeout(() => document.getElementById('b'+id)?.focus(), 60);
}

function delItem(id) {
  document.getElementById('ic-'+id)?.remove();
  updTot();
}

function onJ(id) {
  const j = JENIS.find(x => x.kode === document.getElementById('j'+id).value);
  const u = document.getElementById('u'+id);
  u.disabled = !j?.uk;
  u.placeholder = j?.uk ? '20–70' : '—';
  if (!j?.uk) u.value = '';
  calc(id);
}

function calc(id) {
  const b = parseFloat(document.getElementById('b'+id)?.value)||0;
  const h = parseFloat(document.getElementById('h'+id)?.value)||0;
  document.getElementById('jml'+id).textContent = rp(Math.round(b*h*1000));
  updTot();
}

function getItems() {
  const arr = [];
  for (let i=1;i<=n;i++) {
    const jEl=document.getElementById('j'+i);
    if(!jEl) continue;
    const kode=jEl.value;
    const b=parseFloat(document.getElementById('b'+i)?.value)||0;
    const u=parseFloat(document.getElementById('u'+i)?.value)||null;
    const h=parseFloat(document.getElementById('h'+i)?.value)||0;
    if(!b&&!h) continue;
    const j=JENIS.find(x=>x.kode===kode);
    const hf=h*1000;
    arr.push({no:arr.length+1,jenis_kode:kode,jenis_nama:j?.nama||kode,
      berat:b,ukuran:u,harga:hf,jumlah_nota:Math.round(b*hf),
      jumlah_hitung:Math.round(b*hf),status:'ok'});
  }
  return arr;
}

function getEs() {
  return (parseFloat(document.getElementById('es-qty')?.value)||0)*ES_H;
}

function updEs() {
  document.getElementById('es-tot').textContent = rp(getEs());
  updTot();
}

function updTot() {
  const items=getItems();
  const kg=items.reduce((s,i)=>s+i.berat,0);
  const sub=items.reduce((s,i)=>s+i.jumlah_nota,0);
  const es=getEs();
  const tot=sub-es;
  document.getElementById('t-kg').textContent = kg.toFixed(2)+' kg';
  document.getElementById('t-sub').textContent = rp(sub);
  document.getElementById('t-tot').textContent = rp(tot);
  const er=document.getElementById('t-es-row');
  if(es>0){er.style.display='flex';document.getElementById('t-es').textContent='– '+rp(es);}
  else er.style.display='none';
}

function rp(n) { return 'Rp '+Math.round(n).toLocaleString('id-ID'); }

function getTgl() {
  const v=document.getElementById('tgl').value;
  if(!v) return '';
  return new Date(v+'T00:00:00').toLocaleDateString('id-ID',
    {day:'numeric',month:'long',year:'numeric'});
}

async function go() {
  const nama=document.getElementById('supplier').value.trim();
  if(!nama){toast('Isi nama supplier','err');return;}
  const items=getItems();
  if(!items.length){toast('Tambahkan minimal satu item','err');return;}

  const es=getEs(), sub=items.reduce((s,i)=>s+i.jumlah_nota,0), tot=sub-es;
  const mp={beli:{tipe:'putih',kas:'keluar'},jual:{tipe:'merah-jual',kas:'masuk'},
    packing:{tipe:'merah-packing',kas:'tidak ada'}};

  const data={...mp[tipe],nama,tanggal:getTgl(),
    no_nota:document.getElementById('nonota').value.trim(),
    items,es_balok:es||null,
    subtotal_nota:sub,subtotal_hitung:sub,
    total_nota:tot,total_hitung:tot,
    total_status:'ok',selisih:0,flags:[],side_notes:''};
  last=data;

  const btn=document.getElementById('btn-main');
  btn.disabled=true; btn.textContent='Menyimpan...';

  try {
    const r=await fetch('/api/confirm',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const j=await r.json();
    btn.disabled=false; btn.textContent='✓ Simpan & Print';
    if(j.status==='ok'){toast('✓ Tersimpan','ok');setTimeout(cetak,350);}
    else toast('Gagal: '+j.error,'err');
  } catch(e) {
    btn.disabled=false; btn.textContent='✓ Simpan & Print';
    toast('Gagal terhubung','err');
  }
}

function cetak() {
  if(!last) return;
  const d=last;
  const tl={putih:'BELI','merah-jual':'JUAL','merah-packing':'PACKING'}[d.tipe];
  document.getElementById('np').innerHTML=`
    <div class="np-c np-lg">HAR JUAL BELI UDANG</div>
    <div class="np-c np-s">Jl. Dermaga Baru RT 12 No. 34<br>Toko Lima - Muara Badak</div>
    <div class="np-d"></div>
    <div class="np-r"><span>Nama</span><span>${d.nama}</span></div>
    <div class="np-r"><span>Tanggal</span><span>${d.tanggal}</span></div>
    <div class="np-r"><span>Tipe</span><span>${tl}</span></div>
    ${d.no_nota?`<div class="np-r"><span>No</span><span>${d.no_nota}</span></div>`:''}
    <div class="np-d"></div>
    ${d.items.map(it=>`
      <div style="margin-bottom:5px">
        <div>${it.jenis_nama}${it.ukuran?' uk.'+it.ukuran:''}</div>
        <div class="np-r np-s">
          <span>${it.berat} kg × ${rp(it.harga)}</span>
          <span class="np-b">${rp(it.jumlah_nota)}</span>
        </div>
      </div>`).join('')}
    <div class="np-d"></div>
    ${d.es_balok?`<div class="np-r np-s"><span>Es Balok</span><span>– ${rp(d.es_balok)}</span></div>`:''}
    <div class="np-r np-b" style="font-size:13px">
      <span>TOTAL</span><span>${rp(d.total_nota)}</span>
    </div>
    <div class="np-r np-s" style="margin-top:3px">
      <span>Total Timbangan</span>
      <span>${d.items.reduce((s,i)=>s+i.berat,0).toFixed(2)} kg</span>
    </div>
    <div class="np-d"></div>
    <div class="np-sig">
      <div class="np-sc"><div>Disetujui,</div><div class="np-sl">&nbsp;</div></div>
      <div class="np-sc"><div>Pencatat,</div><div class="np-sl">&nbsp;</div></div>
    </div>`;
  window.print();
}

function toast(msg,type='ok') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.className='toast',2500);
}
</script>
</body>
</html>
